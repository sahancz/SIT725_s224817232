<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple Express calculator for SIT725 Task 2.2P"
    />
    <title>SIT725 Addition Service</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <p class="eyebrow">SIT725 · Task 2.2P</p>
      <section class="card" aria-labelledby="calculator-title">
        <div class="card-heading">
          <div>
            <h1 id="calculator-title">Addition service</h1>
            <p>
              Enter two numbers. This page sends a GET request to the Express
              REST API and displays the server's result.
            </p>
          </div>
          <span class="status"><span></span> Server ready</span>
        </div>

        <form id="calculator-form">
          <label>
            First number
            <input
              id="num1"
              name="num1"
              type="number"
              step="any"
              value="5"
              required
            />
          </label>

          <span class="operator" aria-hidden="true">+</span>

          <label>
            Second number
            <input
              id="num2"
              name="num2"
              type="number"
              step="any"
              value="7"
              required
            />
          </label>

          <button type="submit">Calculate on server</button>
        </form>

        <div id="result" class="result" aria-live="polite">
          <span>Result</span>
          <strong>12</strong>
          <code>GET /api/add?num1=5&amp;num2=7</code>
        </div>
      </section>

      <p class="footer-note">
        Built with Node.js, Express, HTML, CSS and JavaScript.
      </p>
    </main>
  </body>
</html>
